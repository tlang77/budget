<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Budget Dashboard</title>
<style>
:root { color-scheme: light; --accent:#7C3AED; --dark:#5B21B6; --muted:#A78BFA; }
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F7F8FB;min-height:100vh;color:#111827;}

.header{background:linear-gradient(135deg,var(--dark),var(--accent));transition:background 0.3s;}
.hi{max-width:1100px;margin:0 auto;padding:20px 24px 0;}
.heyebrow{font-size:10px;color:rgba(255,255,255,.6);font-weight:700;text-transform:uppercase;letter-spacing:.12em;}
.htitle{font-size:26px;font-weight:900;color:#fff;letter-spacing:-.03em;margin-top:2px;}
.hsub{font-size:10px;color:rgba(255,255,255,.5);margin-top:3px;}
.tabs{display:flex;gap:3px;overflow-x:auto;margin-top:16px;}
.tab{padding:10px 20px;border:none;border-radius:10px 10px 0 0;background:rgba(255,255,255,.15);color:rgba(255,255,255,.85);font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;}
.tab.active{background:#fff;color:var(--accent);}
.tab:hover:not(.active){background:rgba(255,255,255,.25);}

.main{max-width:1100px;margin:0 auto;padding:20px 24px 60px;}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid #F0F0F0;}

/* Summary */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px;}
.sc{padding:16px 18px 14px;}
.sc-lbl{display:flex;align-items:center;gap:5px;margin-bottom:7px;}
.sc-lbl span:first-child{font-size:15px;}
.sc-lbl span:last-child{font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.08em;}
.sc-val{font-size:22px;font-weight:900;letter-spacing:-.03em;}

/* Flow */
.flow{padding:16px 18px;margin-bottom:14px;}
.flow-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.flow-lbl{font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.06em;}
.badge{font-size:12px;font-weight:800;padding:4px 13px;border-radius:20px;}
.bg{color:#059669;background:#D1FAE5;}
.br{color:#DC2626;background:#FEE2E2;}
.frow{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.flbl{width:60px;font-size:11px;color:#9CA3AF;text-align:right;flex-shrink:0;}
.ftrk{flex:1;background:#F3F4F6;border-radius:6px;height:24px;overflow:hidden;}
.ffil{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;}
.ffil span{font-size:11px;color:#fff;font-weight:700;white-space:nowrap;}
.srow{display:flex;align-items:center;gap:10px;margin-top:4px;}
.sspc{width:60px;flex-shrink:0;}
.strk{flex:1;background:#F3F4F6;border-radius:4px;height:4px;overflow:hidden;}
.sfil{height:100%;border-radius:4px;}
.spct{font-size:10px;font-weight:700;white-space:nowrap;}

/* Tables */
.tg{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;}
.dt{display:flex;flex-direction:column;overflow:hidden;}
.dt-hd{padding:12px 15px;display:flex;justify-content:space-between;align-items:center;background:#FAFAFA;}
.dt-hl{font-size:11px;font-weight:800;color:#6B7280;text-transform:uppercase;letter-spacing:.07em;}
.dt-ht{font-size:14px;font-weight:900;}
.dt-bd{overflow-y:auto;max-height:460px;}
.tr{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-bottom:1px solid #F9FAFB;}
.tr-nm{font-size:13px;font-weight:500;color:#111827;}
.tr-nt{font-size:10px;color:#9CA3AF;margin-top:1px;}
.tr-r{display:flex;align-items:center;gap:7px;flex-shrink:0;margin-left:10px;}
.tr-amt{font-size:13px;font-weight:700;}
.pill{font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.04em;}
.dt-ft{padding:11px 15px;display:flex;justify-content:space-between;background:#FAFAFA;}
.dt-fl{font-size:11px;font-weight:700;color:#9CA3AF;}
.dt-ft2{font-size:14px;font-weight:900;}

/* Balances */
.bal-hero{padding:20px 22px;margin-bottom:14px;}
.bal-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;}
.bal-ey{font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.09em;margin-bottom:6px;}
.bal-big{font-size:36px;font-weight:900;letter-spacing:-.04em;}
.bal-sm{font-size:11px;color:#9CA3AF;margin-top:5px;}
.bal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.bal-c{padding:16px 18px;}
.bal-ct{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.bal-nm{font-size:13px;font-weight:700;color:#374151;}
.bal-mk{font-size:11px;color:#9CA3AF;margin-top:2px;}
.bal-am{font-size:28px;font-weight:900;letter-spacing:-.03em;}
.bal-ud{font-size:10px;color:#9CA3AF;margin-top:4px;}
.refresh-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;display:inline-flex;align-items:center;gap:5px;transition:background .15s;}
.refresh-btn:hover{background:rgba(255,255,255,.25);}
.refresh-btn:disabled{opacity:.5;cursor:not-allowed;}
.bal-refresh-btn{background:#F3F4F6;border:1px solid #E5E7EB;color:#374151;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;display:inline-flex;align-items:center;gap:5px;transition:background .15s;}
.bal-refresh-btn:hover{background:#E5E7EB;}

/* Subscriptions */
.sub-sg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:4px;}
.sub-title{font-size:13px;font-weight:800;color:#374151;margin:18px 0 10px;letter-spacing:-.01em;}
.sub-row{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-bottom:1px solid #F9FAFB;}
.sub-row:last-child{border-bottom:none;}
.sub-nm{font-size:13px;font-weight:500;color:#111827;}
.sub-dt{font-size:10px;color:#9CA3AF;margin-top:1px;}
.sub-r{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.sub-amt{font-size:13px;font-weight:700;color:#374151;}
.annual-pill{font-size:9px;font-weight:800;background:#FEF3C7;color:#92400E;padding:2px 7px;border-radius:6px;}
.dream-banner{margin-bottom:12px;padding:12px 16px;background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border:1.5px solid #FCD34D;border-radius:12px;font-size:12px;color:#92400E;font-weight:600;}

/* Auth states */
.auth-overlay{display:flex;align-items:center;justify-content:center;min-height:60vh;}
.auth-box{text-align:center;padding:48px 32px;}
.auth-icon{font-size:52px;margin-bottom:16px;}
.auth-title{font-size:20px;font-weight:800;color:#111827;margin-bottom:8px;}
.auth-sub{font-size:14px;color:#6B7280;margin-bottom:24px;}
.sign-in-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:14px 36px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.sign-in-btn:hover{background:var(--dark);}
.spinner{width:32px;height:32px;border:3px solid #E5E7EB;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:#9CA3AF;}

@media(max-width:700px){
  .hi{padding:14px 14px 0;}
  .htitle{font-size:20px;}
  .main{padding:16px 14px 40px;}
  .sg{grid-template-columns:1fr 1fr;}
  .sg .sc:last-child{grid-column:1/-1;}
  .tg{grid-template-columns:1fr;}
  .bal-grid{grid-template-columns:1fr;}
  .sub-sg{grid-template-columns:1fr 1fr;}
  .sub-sg .sc:last-child{grid-column:1/-1;}
  .tab{padding:8px 13px;font-size:12px;}
}
</style>

// ── Auth state ────────────────────────────────────────────────────────────────
let tokenClient, accessToken = null;
let liveBalances = null, balLastSync = null;
let tab = 'Personal';
let authReady = false;

function waitForGIS(cb) {
  if (typeof google !== 'undefined' && google.accounts) { cb(); return; }
  setTimeout(() => waitForGIS(cb), 100);
}

window.addEventListener('load', () => {
  render(); // render immediately with sign-in state
  waitForGIS(initAuth);
});

function initAuth() {
  authReady = true;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPE,
    callback: handleToken,
  });
  const cached = getStoredToken();
  if (cached) {
    accessToken = cached;
    fetchBalances();
  } else {
    showSignInIfNeeded();
  }
}

function handleToken(resp) {
  if (resp.error || !resp.access_token) { render(); return; }
  accessToken = resp.access_token;
  storeToken(accessToken, resp.expires_in || 3600);
  fetchBalances();
}

function signIn() { tokenClient.requestAccessToken({ prompt: 'consent' }); }

function onRefreshBalances() {
  clearStoredToken();
  liveBalances = null;
  balLastSync = null;
  render();
  tokenClient.requestAccessToken({ prompt: '' });
}

function showSignInIfNeeded() {
  if (tab === 'Balances') render();
}

// ── Token storage ─────────────────────────────────────────────────────────────
function storeToken(tok, exp) {
  try { localStorage.setItem('_bt', JSON.stringify({tok, exp: Date.now() + exp * 1000})); } catch(e) {}
}
function getStoredToken() {
  try { const d = JSON.parse(localStorage.getItem('_bt')||'null'); if(d && Date.now()<d.exp-60000) return d.tok; } catch(e) {}
  return null;
}
function clearStoredToken() { try { localStorage.removeItem('_bt'); } catch(e) {} }

// ── Live data fetch ───────────────────────────────────────────────────────────
async function fetchBalances() {
  if (!accessToken) return;
  try {
    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Balances!A2:E`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    if (res.status === 401) { clearStoredToken(); accessToken = null; render(); return; }
    const data = await res.json();
    liveBalances = data.values || [];
    balLastSync = new Date();
    if (tab === 'Balances') render();
  } catch(e) { console.error(e); }
}

// ── Helpers ───────────────────────────────────────────────────────────────────

}

      {i:balance>=0?'📈':'📉',l:'Cash Balance',v:balance,c:balance>=0?'#059669':'#EF4444'},
    ].map(x=>`<div class="card sc">
      <div class="sc-lbl"><span>${x.i}</span><span>${x.l}</span></div>
      <div class="sc-val" style="color:${x.c}">${money(x.v)}</div>
    </div>`).join('')}
  </div>`;
}

function flowBar(income, expenses, th) {
  const surplus = income - expenses, pos = surplus >= 0;
  const pct = income > 0 ? (surplus / income * 100) : 0;
  const mx = Math.max(income, expenses, 1);
  return `<div class="card flow">
    <div class="flow-hd">
      <span class="flow-lbl">Monthly Cash Flow</span>
      <span class="badge ${pos?'bg':'br'}">${pos?'+':''}${money(surplus)}&nbsp;(${pct>=0?'+':''}${pct.toFixed(1)}%)</span>
    </div>
    ${[['Income',income,'#059669'],['Expenses',expenses,'#EF4444']].map(([lbl,v,col])=>`
      <div class="frow">
        <span class="flbl">${lbl}</span>
        <div class="ftrk"><div class="ffil" style="width:${(v/mx*100).toFixed(1)}%;background:${col}"><span>${money(v)}</span></div></div>
      </div>`).join('')}
    <div class="srow">
      <span class="sspc"></span>
      <div class="strk"><div class="sfil" style="width:${Math.abs(pct).toFixed(1)}%;background:${pos?`linear-gradient(90deg,${th.accent},${th.muted})`:'#EF4444'}"></div></div>
      <span class="spct" style="color:${pos?th.accent:'#EF4444'}">${Math.abs(pct).toFixed(0)}% ${pos?'saved':'deficit'}</span>
    </div>
  </div>`;
}

function makeTable(title, rows, total, accent, showSection=false) {
  return `<div class="card dt">
    <div class="dt-hd" style="border-bottom:2px solid ${accent}">
      <span class="dt-hl">${title}</span>
      <span class="dt-ht" style="color:${accent}">${money(total)}</span>
    </div>
    <div class="dt-bd">
      ${rows.map((r,i)=>`<div class="tr" style="background:${i%2===0?'#fff':'#FAFBFE'}">
        <div style="min-width:0;flex:1">
          <div class="tr-nm">${r.item}</div>
          ${r.notes?`<div class="tr-nt">${r.notes}</div>`:''}
        </div>
        <div class="tr-r">
          ${showSection?`<span class="pill" style="background:${SBG[r.s]};color:${SCOL[r.s]}">${r.s}</span>`:''}
          <span class="tr-amt" style="color:${accent==='#EF4444'?'#374151':accent}">${money(r.amt)}</span>
        </div>
      </div>`).join('')}
    </div>
    <div class="dt-ft" style="border-top:1px solid #F3F4F6">
      <span class="dt-fl">TOTAL</span>
      <span class="dt-ft2" style="color:${accent}">${money(total)}</span>
    </div>
  </div>`;
}

// ── Tab renderers ─────────────────────────────────────────────────────────────
function renderPersonal() {
  const th = THEMES.Personal;
  const income = PERSONAL.filter(r=>r.c==='income');
  const expenses = PERSONAL.filter(r=>r.c==='expense');
  const ti = income.reduce((s,r)=>s+r.amt,0);
  const te = expenses.reduce((s,r)=>s+r.amt,0);
  return summaryCards(ti,te,ti-te,th)
    + flowBar(ti,te,th)
    + `<div class="tg">${makeTable('Income Sources',income,ti,th.accent,true)}${makeTable('Expenses',expenses,te,'#EF4444',true)}</div>`;
}

function renderBusiness() {
  const th = THEMES.Business;
  const income = BUSINESS.filter(r=>r.c==='income');
  const expenses = BUSINESS.filter(r=>r.c==='expense');
  const ti = income.reduce((s,r)=>s+r.amt,0);
  const te = expenses.reduce((s,r)=>s+r.amt,0);
  return summaryCards(ti,te,ti-te,th)
    + flowBar(ti,te,th)
    + `<div class="tg">${makeTable('Revenue',income,ti,th.accent)}${makeTable('Expenses',expenses,te,'#EF4444')}</div>`;
}

function renderDream() {
  const th = THEMES.Dream;
  const income = DREAM.filter(r=>r.c==='income');
  const expenses = DREAM.filter(r=>r.c==='expense');
  const ti = income.reduce((s,r)=>s+r.amt,0);
  const te = expenses.reduce((s,r)=>s+r.amt,0);
  return `<div class="dream-banner">✨ Dream Budget — projected goals at $100k+ annual target</div>`
    + summaryCards(ti,te,ti-te,th)
    + flowBar(ti,te,th)
    + `<div class="tg">${makeTable('Goal Income',income,ti,th.accent)}${makeTable('Projected Expenses',expenses,te,'#EF4444')}</div>`;
}

function renderBalances() {
  const th = THEMES.Balances;

  // Not yet authenticated
  if (!accessToken && !liveBalances) {
    return `<div class="auth-overlay"><div class="auth-box">
      <div class="auth-icon">🏦</div>
      <div class="auth-title">Sign in to view live balances</div>
      <div class="auth-sub">Connects to your Budget Tracking sheet</div>
      ${authReady ? `<button class="sign-in-btn" onclick="signIn()">Sign in with Google</button>` : `<div class="spinner"></div><div class="loading-text">Connecting…</div>`}
    </div></div>`;
  }

  // Loading
  if (!liveBalances) {
    return `<div class="auth-overlay"><div class="auth-box">
      <div class="spinner"></div>
      <div class="loading-text">Loading live balances…</div>
    </div></div>`;
  }

  // Parse: [name, mask, type, balance, updated]
  const balances = liveBalances.map(row => {
    const balance = parseFloat(row[3]) || 0;
    const mask = row[1] || '';
    const isCredit = CC_MASKS.includes(mask);
    return {
      account: row[0] || '',
      mask,
      type: row[2] || 'personal',
      balance: isCredit ? Math.abs(balance) : balance,
      credit: isCredit,
      updated: row[4] || ''
    };
  });

  const cash = balances.filter(b=>!b.credit);
  const totalCash = cash.reduce((s,b)=>s+b.balance,0);
  const totalCredit = balances.filter(b=>b.credit).reduce((s,b)=>s+b.balance,0);
  const net = totalCash - totalCredit;
  const syncStr = balLastSync ? balLastSync.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '—';

  return `<div class="card bal-hero">
    <div class="bal-top">
      <div>
        <div class="bal-ey">Net Liquid Assets</div>
        <div class="bal-big" style="color:${th.accent}">${money(net)}</div>
        <div class="bal-sm">${money(totalCash)} cash &nbsp;·&nbsp; ${money(totalCredit)} credit owed &nbsp;·&nbsp; Synced ${syncStr}</div>
      </div>
      <button class="bal-refresh-btn" onclick="onRefreshBalances()">↻ Refresh</button>
    </div>
  </div>
  <div class="bal-grid">
    ${balances.map(b=>`<div class="card bal-c">
      <div class="bal-ct">
        <div><div class="bal-nm">${b.account}</div><div class="bal-mk">···${b.mask}</div></div>
        <span class="pill" style="background:${SBG[b.type]||SBG.personal};color:${SCOL[b.type]||SCOL.personal}">${b.type}</span>
      </div>
      <div class="bal-am" style="color:${b.credit?'#EF4444':SCOL[b.type]||SCOL.personal}">${b.credit?'-':''}${money(b.balance)}</div>
      <div class="bal-ud">Last updated ${b.updated}</div>
    </div>`).join('')}
  </div>`;
}

function renderSubscriptions() {
  const th = THEMES.Subscriptions;
  const persMonthly = SUBS_MONTHLY.filter(s=>s.cat==='personal');
  const bizMonthly  = SUBS_MONTHLY.filter(s=>s.cat==='business');
  const totalMonthly = SUBS_MONTHLY.reduce((s,r)=>s+r.amt,0);
  const totalAnnual  = SUBS_ANNUAL.reduce((s,r)=>s+r.amt,0);
  const annualMoEquiv = totalAnnual / 12;
  const grand = totalMonthly + annualMoEquiv;

  const sRow = (s,i,annual=false) => `<div class="sub-row" style="background:${i%2===0?'#fff':'#FAFBFE'}">
    <div style="min-width:0;flex:1">
      <div class="sub-nm">${s.name}</div>
      ${s.notes||s.renews?`<div class="sub-dt">${[s.renews,s.notes].filter(Boolean).join(' · ')}</div>`:''}
    </div>
    <div class="sub-r">
      <span class="pill" style="background:${SBG[s.acct]};color:${SCOL[s.acct]}">${s.acct}</span>
      ${annual?`<span class="annual-pill">${money(s.amt)}/yr</span>`:''}
      <span class="sub-amt">${annual?money(s.amt/12)+'/mo':money(s.amt)}</span>
    </div>
  </div>`;

  return `<div class="sub-sg">
    <div class="card sc"><div class="sc-lbl"><span>💸</span><span>Monthly Recurring</span></div><div class="sc-val" style="color:${th.accent}">${money(totalMonthly)}</div></div>
    <div class="card sc"><div class="sc-lbl"><span>📅</span><span>Annual (per month)</span></div><div class="sc-val" style="color:#D97706">${money(annualMoEquiv)}</div></div>
    <div class="card sc"><div class="sc-lbl"><span>📊</span><span>Total Monthly Cost</span></div><div class="sc-val" style="color:#EF4444">${money(grand)}</div></div>
  </div>
  <div class="sub-title">Personal &amp; Joint — Monthly (${money(persMonthly.reduce((s,r)=>s+r.amt,0))})</div>
  <div class="card">${persMonthly.map((s,i)=>sRow(s,i)).join('')}</div>
  <div class="sub-title">Business — Monthly (${money(bizMonthly.reduce((s,r)=>s+r.amt,0))})</div>
  <div class="card">${bizMonthly.map((s,i)=>sRow(s,i)).join('')}</div>
  <div class="sub-title">Annual Subscriptions (${money(totalAnnual)}/yr · ${money(annualMoEquiv)}/mo equiv)</div>
  <div class="card">${SUBS_ANNUAL.map((s,i)=>sRow(s,i,true)).join('')}</div>`;
}

// ── Main render ───────────────────────────────────────────────────────────────
const RENDERERS = {Personal:renderPersonal,Business:renderBusiness,Dream:renderDream,Balances:renderBalances,Subscriptions:renderSubscriptions};

function render() {
  setTheme(tab);
  document.getElementById('app').innerHTML = `<div>
    <div class="header">
      <div class="hi">
        <div class="heyebrow">Finance Tracker</div>
        <div class="htitle">Budget Dashboard</div>
        <div class="hsub">Budget Tracking · ${tab === 'Balances' && balLastSync ? 'Live data' : 'Data as of April 21, 2026'}</div>
        <div class="tabs">
          ${Object.keys(THEMES).map(t=>`<button class="tab${t===tab?' active':''}" onclick="go('${t}')">${ICONS[t]} ${t}</button>`).join('')}
        </div>
      </div>
    </div>
    <div class="main">${RENDERERS[tab]()}</div>
  </div>`;
}

function go(t) {
  tab = t;
  render();
  // Fetch live data when switching to Balances if not loaded yet
  if (t === 'Balances' && !liveBalances && accessToken) fetchBalances();
  if (t === 'Balances' && !accessToken) showSignInIfNeeded();
}

render();
</script>
</body>
</html>
